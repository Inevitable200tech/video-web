  <!-- Security Script (Anti-Inspect) -->
  <script>
    // 1. Disable Right Click
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // 2. Disable Keyboard Shortcuts (F12, Ctrl+Shift+I, etc.)
    document.addEventListener('keydown', (e) => {
      if (
        e.keyCode === 123 || // F12
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
        (e.ctrlKey && e.keyCode === 85) // Ctrl+U (View Source)
      ) {
        e.preventDefault();
        return false;
      }
    });

    // 3. Debugger Loop (Anti-DevTools)
    (function() {
      const devtools = { open: false };
      const threshold = 160;
      const emitEvent = (state) => {
        if (state) {
          window.location.reload(); // Hard reset if tools are opened
        }
      };

      setInterval(() => {
        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        if (!(heightThreshold && widthThreshold) && (widthThreshold || heightThreshold)) {
          if (!devtools.open) emitEvent(true);
          devtools.open = true;
        } else {
          devtools.open = false;
        }
      }, 500);

      // Recursive Debugger to pause execution if tools are open
      const block = () => {
        setInterval(() => {
          (function() { return false; }['constructor']('debugger')());
        }, 50);
      };
      // block(); // Uncomment this for extreme protection, but it can be annoying during dev
    })();
  </script>
